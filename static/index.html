<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro Academia</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f8f6; --surface: #fff; --border: #e5e5e0;
    --text: #1a1a1a; --muted: #666; --hint: #999;
    --green: #0F6E56; --green-bg: #E1F5EE;
    --red: #A32D2D; --red-bg: #FCEBEB;
    --amber: #854F0B; --amber-bg: #FAEEDA;
    --blue: #185FA5; --blue-bg: #E6F1FB;
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .logo { font-size: 15px; font-weight: 600; color: var(--text); padding: 0 8px; margin-bottom: 1rem; }
  .logo span { color: var(--green); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); cursor: pointer; color: var(--muted); font-size: 13px; font-weight: 500; transition: all .15s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--bg); color: var(--text); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .main { flex: 1; padding: 2rem; max-width: 900px; }
  .page { display: none; } .page.active { display: block; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .kcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; }
  .kcard .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .kcard .val { font-size: 20px; font-weight: 600; }
  .kcard .sub { font-size: 11px; color: var(--hint); margin-top: 3px; }
  .pos { color: var(--green); } .neg { color: var(--red); } .warn { color: var(--amber); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 8px; }
  .item { display: flex; align-items: center; gap: 10px; }
  .item .d { flex: 1; }
  .item .d .t { font-size: 13px; font-weight: 500; }
  .item .d .m { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .item .v { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge.pago, .badge.recebido { background: var(--green-bg); color: var(--green); }
  .badge.aberto { background: var(--amber-bg); color: var(--amber); }
  .badge.vencido { background: var(--red-bg); color: var(--red); }
  .badge.pagar-tipo { background: var(--red-bg); color: var(--red); }
  .badge.receber-tipo { background: var(--blue-bg); color: var(--blue); }
  .btn { padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text); transition: all .15s; }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn.primary:hover { opacity: .85; }
  .btn.sm { padding: 5px 12px; font-size: 12px; }
  .btn.danger { color: var(--red); border-color: #F09595; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px; font-weight: 500; color: var(--muted); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
  .form-panel { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 1rem; display: none; }
  .form-panel.open { display: block; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .f { display: flex; flex-direction: column; gap: 4px; }
  .f label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .f input, .f select { border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; transition: border-color .15s; }
  .f input:focus, .f select:focus { border-color: #aaa; }
  .actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .toast { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-top: 10px; display: none; }
  .toast.ok { background: var(--green-bg); color: var(--green); }
  .toast.err { background: var(--red-bg); color: var(--red); }
  .dre-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .dre-row:last-child { border-bottom: none; }
  .dre-row.total { font-weight: 600; font-size: 15px; padding-top: 12px; }
  .dre-row.sub { padding-left: 14px; color: var(--muted); }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width .4s; }
  .chat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; height: 420px; }
  .msgs { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.55; }
  .msg.ag { background: var(--bg); border: 1px solid var(--border); align-self: flex-start; }
  .msg.us { background: var(--text); color: #fff; align-self: flex-end; }
  .cin { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); }
  .cin input { flex: 1; border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); display: inline-block; animation: bk 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; } .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bk { 0%,80%,100% { opacity: .2; } 40% { opacity: 1; } }
  .qs-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .empty { text-align: center; color: var(--hint); padding: 2rem; font-size: 13px; }
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main { padding: 1rem; }
    .row2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="logo">&#128171; <span>Academia</span> Finance</div>
    <button class="nav-item active" onclick="goTo('dash', this)"><span class="icon">&#128200;</span> Visão geral</button>
    <button class="nav-item" onclick="goTo('pagar', this)"><span class="icon">&#128193;</span> Contas a pagar</button>
    <button class="nav-item" onclick="goTo('receber', this)"><span class="icon">&#128181;</span> Contas a receber</button>
    <button class="nav-item" onclick="goTo('fluxo', this)"><span class="icon">&#128202;</span> Fluxo de caixa</button>
    <button class="nav-item" onclick="goTo('dre', this)"><span class="icon">&#128196;</span> DRE</button>
    <button class="nav-item" onclick="goTo('chat', this)"><span class="icon">&#129302;</span> Agente IA</button>
  </nav>

  <main class="main">

    <!-- Dashboard -->
    <div id="dash" class="page active">
      <h1>Visão geral</h1>
      <div class="kpis" id="kpis"></div>
      <hr class="divider">
      <div class="section-title">Vencimentos próximos (7 dias)</div>
      <div id="venc-list"></div>
    </div>

    <!-- Contas a Pagar -->
    <div id="pagar" class="page">
      <div class="actions">
        <h1 style="margin:0">Contas a pagar</h1>
        <button class="btn primary sm" onclick="toggleForm('fp')">+ Nova conta</button>
      </div>
      <div class="form-panel" id="fp">
        <div class="row2">
          <div class="f"><label>Descrição</label><input id="p-desc" type="text" placeholder="Ex: Aluguel"></div>
          <div class="f"><label>Categoria</label><select id="p-cat"><option>Energia</option><option>Aluguel</option><option>Salários</option><option>Manutenção</option><option>Fornecedor</option><option>Impostos</option><option>Outros</option></select></div>
        </div>
        <div class="row2">
          <div class="f"><label>Valor (R$)</label><input id="p-val" type="number" min="0" step="0.01"></div>
          <div class="f"><label>Vencimento</label><input id="p-venc" type="date"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn primary" onclick="addConta('pagar')">Salvar</button>
          <button class="btn" onclick="toggleForm('fp')">Cancelar</button>
        </div>
        <div id="t-p" class="toast"></div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('pagar','todos',this)">Todos</button>
        <button class="filter-btn" onclick="setFilter('pagar','aberto',this)">Em aberto</button>
        <button class="filter-btn" onclick="setFilter('pagar','vencido',this)">Vencidos</button>
        <button class="filter-btn" onclick="setFilter('pagar','pago',this)">Pagos</button>
      </div>
      <div id="list-pagar"></div>
    </div>

    <!-- Contas a Receber -->
    <div id="receber" class="page">
      <div class="actions">
        <h1 style="margin:0">Contas a receber</h1>
        <button class="btn primary sm" onclick="toggleForm('fr')">+ Nova conta</button>
      </div>
      <div class="form-panel" id="fr">
        <div class="row2">
          <div class="f"><label>Descrição</label><input id="r-desc" type="text" placeholder="Ex: Mensalidade"></div>
          <div class="f"><label>Categoria</label><select id="r-cat"><option>Mensalidade</option><option>Serviço avulso</option><option>Venda</option><option>Outros</option></select></div>
        </div>
        <div class="row2">
          <div class="f"><label>Valor (R$)</label><input id="r-val" type="number" min="0" step="0.01"></div>
          <div class="f"><label>Vencimento</label><input id="r-venc" type="date"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn primary" onclick="addConta('receber')">Salvar</button>
          <button class="btn" onclick="toggleForm('fr')">Cancelar</button>
        </div>
        <div id="t-r" class="toast"></div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('receber','todos',this)">Todos</button>
        <button class="filter-btn" onclick="setFilter('receber','aberto',this)">Em aberto</button>
        <button class="filter-btn" onclick="setFilter('receber','vencido',this)">Vencidos</button>
        <button class="filter-btn" onclick="setFilter('receber','recebido',this)">Recebidos</button>
      </div>
      <div id="list-receber"></div>
    </div>

    <!-- Fluxo de Caixa -->
    <div id="fluxo" class="page">
      <h1>Fluxo de caixa</h1>
      <div id="fluxo-content"></div>
    </div>

    <!-- DRE -->
    <div id="dre" class="page">
      <h1>DRE — Demonstrativo de Resultado</h1>
      <div id="dre-content"></div>
    </div>

    <!-- Chat IA -->
    <div id="chat" class="page">
      <h1>Agente IA</h1>
      <div class="chat-box">
        <div class="msgs" id="msgs">
          <div class="msg ag">Olá! Sou seu agente financeiro. Tenho acesso a todas as contas, fluxo de caixa e DRE da academia. Como posso ajudar?</div>
        </div>
        <div class="cin">
          <input id="cin" type="text" placeholder="Ex: Quais contas vencem esta semana?" onkeydown="if(event.key==='Enter')sendChat()">
          <button class="btn primary" onclick="sendChat()">Enviar</button>
        </div>
      </div>
      <div class="qs-btns">
        <button class="btn sm" onclick="qs('Quais contas vencem nos próximos 7 dias?')">Vencimentos da semana</button>
        <button class="btn sm" onclick="qs('Qual o saldo previsto do mês?')">Saldo do mês</button>
        <button class="btn sm" onclick="qs('Quais são minhas maiores despesas?')">Maiores despesas</button>
        <button class="btn sm" onclick="qs('Analise o DRE e dê recomendações.')">Analisar DRE</button>
      </div>
    </div>

  </main>
</div>

<script>
const fmt = v => 'R$ ' + parseFloat(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
const today = new Date().toISOString().split('T')[0];
const daysFrom = d => Math.ceil((new Date(d+'T00:00:00') - new Date(today+'T00:00:00')) / 86400000);
const fmtD = d => new Date(d+'T00:00:00').toLocaleDateString('pt-BR');

let filters = { pagar: 'todos', receber: 'todos' };
let resumoData = {};

function goTo(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  btn.classList.add('active');
  if (page === 'dash') loadDash();
  if (page === 'pagar') loadLista('pagar');
  if (page === 'receber') loadLista('receber');
  if (page === 'fluxo') loadFluxo();
  if (page === 'dre') loadDRE();
}

function toggleForm(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function showToast(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

async function loadDash() {
  const data = await fetch('/api/resumo').then(r => r.json());
  resumoData = data;
  document.getElementById('kpis').innerHTML = `
    <div class="kcard"><div class="lbl">A pagar</div><div class="val neg">${fmt(data.a_pagar)}</div></div>
    <div class="kcard"><div class="lbl">A receber</div><div class="val pos">${fmt(data.a_receber)}</div></div>
    <div class="kcard"><div class="lbl">Saldo previsto</div><div class="val ${data.saldo_previsto>=0?'pos':'neg'}">${fmt(data.saldo_previsto)}</div></div>
    <div class="kcard"><div class="lbl">Recebido</div><div class="val pos">${fmt(data.recebido_mes)}</div><div class="sub">realizado</div></div>
    <div class="kcard"><div class="lbl">Pago</div><div class="val neg">${fmt(data.pago_mes)}</div><div class="sub">realizado</div></div>
    <div class="kcard"><div class="lbl">Alertas 7 dias</div><div class="val warn">${data.venc7_pagar + data.venc7_receber}</div><div class="sub">${data.vencidos_pagar} vencidos</div></div>
  `;
  const list = document.getElementById('venc-list');
  if (!data.proximos_vencimentos.length) { list.innerHTML = '<div class="empty">Nenhum vencimento próximo.</div>'; return; }
  list.innerHTML = data.proximos_vencimentos.map(c => `
    <div class="card"><div class="item">
      <span class="badge ${c.tipo}-tipo">${c.tipo === 'pagar' ? 'Pagar' : 'Receber'}</span>
      <div class="d"><div class="t">${c.desc}</div><div class="m">${c.categoria} · ${fmtD(c.vencimento)} ${daysFrom(c.vencimento)<0?'· <span style="color:var(--red)">VENCIDO</span>':daysFrom(c.vencimento)===0?'· hoje':'· em '+daysFrom(c.vencimento)+' dias'}</div></div>
      <div class="v ${c.tipo==='pagar'?'neg':'pos'}">${fmt(c.valor)}</div>
    </div></div>`).join('');
}

function setFilter(tipo, f, btn) {
  filters[tipo] = f;
  btn.closest('.filters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadLista(tipo);
}

async function loadLista(tipo) {
  const f = filters[tipo];
  const url = f === 'todos' ? `/api/${tipo}` : `/api/${tipo}?status=${f}`;
  const data = await fetch(url).then(r => r.json());
  const pKey = tipo === 'pagar' ? 'pago' : 'recebido';
  const novoStatus = tipo === 'pagar' ? 'pago' : 'recebido';
  const el = document.getElementById('list-' + tipo);
  if (!data.length) { el.innerHTML = '<div class="empty">Nenhuma conta encontrada.</div>'; return; }
  el.innerHTML = data.map(c => `
    <div class="card"><div class="item">
      <span class="badge ${c.status}">${c.status === 'recebido' ? 'Recebido' : c.status === 'pago' ? 'Pago' : c.status === 'vencido' ? 'Vencido' : 'Em aberto'}</span>
      <div class="d">
        <div class="t">${c.desc}</div>
        <div class="m">${c.categoria} · vence ${fmtD(c.vencimento)}${c.status !== pKey && daysFrom(c.vencimento) < 0 ? ' · <span style="color:var(--red)">'+Math.abs(daysFrom(c.vencimento))+' dias em atraso</span>' : ''}</div>
      </div>
      <div class="v ${tipo==='pagar'?'neg':'pos'}">${fmt(c.valor)}</div>
      ${c.status !== pKey ? `<button class="btn sm primary" onclick="marcar(${c.id},'${tipo}','${novoStatus}')">${tipo==='pagar'?'Baixar':'Receber'}</button>` : ''}
    </div></div>`).join('');
}

async function marcar(id, tipo, status) {
  await fetch(`/api/${tipo}/${id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status}) });
  loadLista(tipo);
}

async function addConta(tipo) {
  const desc = document.getElementById(tipo[0]+'-desc').value.trim();
  const cat = document.getElementById(tipo[0]+'-cat').value;
  const val = parseFloat(document.getElementById(tipo[0]+'-val').value);
  const venc = document.getElementById(tipo[0]+'-venc').value;
  const tid = 't-' + tipo[0];
  if (!desc || !val || !venc) { showToast(tid, 'Preencha todos os campos.', 'err'); return; }
  const res = await fetch(`/api/${tipo}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({desc, categoria:cat, valor:val, vencimento:venc}) });
  if (res.ok) {
    showToast(tid, 'Conta registrada!', 'ok');
    document.getElementById(tipo[0]+'-desc').value = '';
    document.getElementById(tipo[0]+'-val').value = '';
    loadLista(tipo);
  }
}

async function loadFluxo() {
  const [pagar, receber] = await Promise.all([fetch('/api/pagar').then(r=>r.json()), fetch('/api/receber').then(r=>r.json())]);
  const semanas = [['1–7',1,7],['8–15',8,15],['16–22',16,22],['23–30',23,30]];
  const rows = semanas.map(([lbl,ini,fim]) => {
    const ok = d => { const n = parseInt(d.split('-')[2]); return n >= ini && n <= fim; };
    const entr = receber.filter(c=>ok(c.vencimento)).reduce((a,c)=>a+c.valor,0);
    const said = pagar.filter(c=>ok(c.vencimento)).reduce((a,c)=>a+c.valor,0);
    return {lbl, entr, said, saldo: entr-said};
  });
  const maxV = Math.max(...rows.map(r=>Math.max(r.entr,r.said)), 1);
  const totE = rows.reduce((a,r)=>a+r.entr,0);
  const totS = rows.reduce((a,r)=>a+r.said,0);
  let html = `<div class="kpis">
    <div class="kcard"><div class="lbl">Total entradas</div><div class="val pos">${fmt(totE)}</div></div>
    <div class="kcard"><div class="lbl">Total saídas</div><div class="val neg">${fmt(totS)}</div></div>
    <div class="kcard"><div class="lbl">Resultado</div><div class="val ${totE-totS>=0?'pos':'neg'}">${fmt(totE-totS)}</div></div>
  </div><hr class="divider"><div class="section-title">Semanas do mês</div>`;
  rows.forEach(r => {
    const pE = Math.round(r.entr/maxV*100), pS = Math.round(r.said/maxV*100);
    html += `<div class="card" style="margin-bottom:10px">
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px">Semana ${r.lbl}</div>
      <div class="bar-row"><div style="font-size:12px;min-width:70px;color:var(--green)">Entradas</div><div class="bar-bg"><div class="bar-fill" style="width:${pE}%;background:#1D9E75"></div></div><div style="font-size:13px;font-weight:600;min-width:90px;text-align:right;color:var(--green)">${fmt(r.entr)}</div></div>
      <div class="bar-row"><div style="font-size:12px;min-width:70px;color:var(--red)">Saídas</div><div class="bar-bg"><div class="bar-fill" style="width:${pS}%;background:#E24B4A"></div></div><div style="font-size:13px;font-weight:600;min-width:90px;text-align:right;color:var(--red)">${fmt(r.said)}</div></div>
      <div style="font-size:12px;text-align:right;font-weight:600;color:${r.saldo>=0?'var(--green)':'var(--red)'}">Saldo: ${fmt(r.saldo)}</div>
    </div>`;
  });
  document.getElementById('fluxo-content').innerHTML = html;
}

async function loadDRE() {
  const data = await fetch('/api/dre').then(r => r.json());
  let html = `<div class="card">
    <div class="dre-row"><span>Receita bruta</span><span class="pos">${fmt(data.receita_bruta)}</span></div>
    <div class="dre-row" style="font-size:12px;color:var(--muted);padding:4px 0 2px"><span>Despesas</span></div>`;
  data.despesas.forEach(d => {
    html += `<div class="dre-row sub"><span>${d.categoria}</span><span class="neg">(${fmt(d.total)})</span></div>`;
  });
  html += `<div class="dre-row" style="border-top:1px solid var(--border);padding-top:10px"><span>Total despesas</span><span class="neg">(${fmt(data.total_despesas)})</span></div>
    <div class="dre-row total"><span>Resultado líquido</span><span class="${data.resultado>=0?'pos':'neg'}">${fmt(data.resultado)}</span></div>
  </div>
  <div class="card" style="display:flex;justify-content:space-between;align-items:center">
    <span style="color:var(--muted);font-size:13px">Margem líquida</span>
    <span style="font-weight:600;font-size:16px;color:${data.margem>=0?'var(--green)':'var(--red)'}">${data.margem}%</span>
  </div>`;
  document.getElementById('dre-content').innerHTML = html;
}

async function sendChat() {
  const inp = document.getElementById('cin');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  const msgs = document.getElementById('msgs');
  msgs.innerHTML += `<div class="msg us">${msg}</div>`;
  const tp = document.createElement('div'); tp.className = 'msg ag';
  tp.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  msgs.appendChild(tp); msgs.scrollTop = msgs.scrollHeight;

  const [resumo, dre] = await Promise.all([fetch('/api/resumo').then(r=>r.json()), fetch('/api/dre').then(r=>r.json())]);
  const ctx = `Você é o agente financeiro de uma academia. Dados atuais:
- A pagar: R$${resumo.a_pagar.toFixed(2)}, A receber: R$${resumo.a_receber.toFixed(2)}, Saldo previsto: R$${resumo.saldo_previsto.toFixed(2)}
- Pago no mês: R$${resumo.pago_mes.toFixed(2)}, Recebido: R$${resumo.recebido_mes.toFixed(2)}
- Contas vencidas: ${resumo.vencidos_pagar} a pagar, ${resumo.vencidos_receber} a receber
- Próximos vencimentos: ${JSON.stringify(resumo.proximos_vencimentos)}
- DRE: receita R$${dre.receita_bruta.toFixed(2)}, despesas R$${dre.total_despesas.toFixed(2)}, resultado R$${dre.resultado.toFixed(2)}, margem ${dre.margem}%
Responda em português de forma direta e objetiva, como um contador experiente.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: ctx, messages: [{role:'user',content:msg}] })
    });
    const data = await res.json();
    tp.innerHTML = data.content?.find(c=>c.type==='text')?.text || 'Não consegui processar.';
  } catch(e) { tp.innerHTML = 'Erro ao conectar com o agente.'; }
  msgs.scrollTop = msgs.scrollHeight;
}

function qs(t) { document.getElementById('cin').value = t; sendChat(); }

document.getElementById('p-venc').value = today;
document.getElementById('r-venc').value = today;
loadDash();
</script>
